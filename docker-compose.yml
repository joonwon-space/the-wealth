services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: the_wealth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/the_wealth
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: http://localhost:3000,https://joonwon.dev
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    stop_grace_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.joonwon.dev
        NEXT_PUBLIC_SENTRY_DSN: https://9dcd414aac45d9d356af673e53bf0f63@o4511081209987072.ingest.us.sentry.io/4511081216147456
    environment:
      NEXT_PUBLIC_API_URL: https://api.joonwon.dev
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Runs once per day at 02:00 via supercronic.
  # Backups are written to the postgres_backups volume.
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-the_wealth}
      BACKUP_DIR: /backups
      KEEP_DAILY: ${BACKUP_KEEP_DAILY:-7}
      KEEP_WEEKLY: ${BACKUP_KEEP_WEEKLY:-4}
      KEEP_MONTHLY: ${BACKUP_KEEP_MONTHLY:-3}
      # R2_ENDPOINT, R2_BUCKET, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY
      # are loaded from env_file (backend/.env) — do not override here
    volumes:
      - postgres_backups:/backups
      - ./scripts/backup-postgres.sh:/usr/local/bin/backup-postgres.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    # Use Alpine's built-in crond.  The tab runs daily at 02:00 server time.
    # aws-cli is installed at container start for R2 uploads.
    command: >
      sh -c "
        apk add --no-cache aws-cli --quiet &&
        echo '0 2 * * * /usr/local/bin/backup-postgres.sh >> /backups/backup.log 2>&1' > /etc/crontabs/root &&
        crond -f -l 8
      "

volumes:
  postgres_data:
  redis_data:
  postgres_backups:
