<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  label { font-size: 12px; font-weight: 500; color: var(--muted-foreground); display:block; margin-bottom: 6px; }
  input, select { width: 100%; box-sizing: border-box; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--background); color: var(--foreground); font-family: var(--font-sans); font-size: 14px; }
  input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px color-mix(in oklab, var(--primary) 20%, transparent); }
  .err input { border-color: var(--destructive); }
  .err small { color: var(--destructive); font-size: 12px; }
  .search { position: relative; }
  .search svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted-foreground); }
  .search input { padding-left: 34px; }
  .kbd { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); background: var(--muted); padding: 2px 6px; border-radius: 4px; }
</style>
</head>
<body class="tw-body">
  <div>
    <label>종목 코드</label>
    <input placeholder="005930" />
  </div>
  <div>
    <label>수량</label>
    <input value="125" />
  </div>
  <div class="err">
    <label>목표가 (상한)</label>
    <input value="abc" />
    <small>숫자만 입력해주세요.</small>
  </div>
  <div>
    <label>검색</label>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input placeholder="종목명 또는 코드" />
      <span class="kbd">⌘K</span>
    </div>
  </div>
</body>
</html>
