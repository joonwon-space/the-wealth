<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding: 20px; }
  .specimen { display:flex; align-items: baseline; gap: 16px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .specimen:last-child { border: 0; }
  .meta { color: var(--muted-foreground); font-family: var(--font-mono); font-size: 11px; min-width: 140px; }
</style>
</head>
<body class="tw-body">
  <div class="specimen"><span class="meta">H3 · 18/600</span><span class="tw-h3">최근 거래내역</span></div>

  <div class="specimen"><span class="meta">Small · 13/400</span><span class="tw-small">30초 주기로 현재가가 갱신됩니다</span></div>
  <div class="specimen"><span class="meta">Micro · 12/500</span><span class="tw-micro">UPDATED 11:32 KST</span></div>

</html>
