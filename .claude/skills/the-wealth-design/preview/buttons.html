<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding: 20px; display:flex; flex-wrap: wrap; gap: 10px; align-items:center; }
  button { font-family: var(--font-sans); font-size: 14px; font-weight: 500; padding: 8px 14px; border-radius: 8px; border: 1px solid transparent; cursor: pointer; transition: background .15s ease-out, color .15s ease-out; }
  .primary { background: var(--primary); color: var(--primary-foreground); }
  .primary:hover { background: color-mix(in oklab, var(--primary) 90%, black); }
  .secondary { background: var(--secondary); color: var(--secondary-foreground); border-color: var(--border); }
  .ghost { background: transparent; color: var(--foreground); }
  .ghost:hover { background: var(--accent); }
  .destructive { background: var(--destructive); color: #fff; }
  .outline { background: transparent; border-color: var(--border); color: var(--foreground); }
  .outline:hover { background: var(--accent); }
  .sm { padding: 4px 10px; font-size: 13px; }
  .lg { padding: 10px 18px; font-size: 15px; }
  .dis { opacity: 0.5; pointer-events: none; }
</style>
</head>
<body class="tw-body">
  <button class="primary">저장</button>
  <button class="secondary">취소</button>
  <button class="outline">편집</button>
  <button class="ghost">더보기</button>
  <button class="destructive">삭제</button>
  <button class="primary sm">추가</button>
  <button class="primary lg">동기화 시작</button>
  <button class="primary dis">비활성</button>
</body>
</html>
