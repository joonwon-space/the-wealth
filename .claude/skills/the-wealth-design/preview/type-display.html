<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding: 20px; }
  .specimen { display:flex; align-items: baseline; gap: 16px; padding: 4px 0; border-bottom: 1px solid var(--border); }
  .specimen:last-child { border: 0; }
  .meta { color: var(--muted-foreground); font-family: var(--font-mono); font-size: 11px; min-width: 140px; }
</style>
</head>
<body class="tw-body">
  <div class="specimen">
    <span class="meta">Display · 40/700</span>
    <span class="tw-display">₩42,180,500</span>
  </div>
  <div class="specimen">
    <span class="meta">H1 · 28/700</span>
    <span class="tw-h1">보유 종목</span>
  </div>
  <div class="specimen">
    <span class="meta">H2 · 22/600</span>
    <span class="tw-h2">섹터별 자산 배분</span>
  </div>
</body>
</html>
