<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
  .sw { border-radius: 8px; height: 72px; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px 8px; color: #fff; font-size: 10px; }
  .sw b { font-size: 11px; font-weight: 600; }
  .sw small { opacity: 0.9; font-family: var(--font-mono); }
</style>
</head>
<body class="tw-body">
  <div class="row">
    <div class="sw" style="background:var(--chart-1)"><b>chart-1</b><small>#1E90FF</small></div>
    <div class="sw" style="background:var(--chart-2);color:#000"><b>chart-2</b><small>#00FF00</small></div>
    <div class="sw" style="background:var(--chart-3)"><b>chart-3</b><small>#F59E0B</small></div>
    <div class="sw" style="background:var(--chart-4)"><b>chart-4</b><small>#F43F5E</small></div>
    <div class="sw" style="background:var(--chart-5)"><b>chart-5</b><small>#8B5CF6</small></div>
    <div class="sw" style="background:var(--chart-6)"><b>chart-6</b><small>#06B6D4</small></div>
    <div class="sw" style="background:var(--chart-7)"><b>chart-7</b><small>#F97316</small></div>
    <div class="sw" style="background:var(--chart-8)"><b>chart-8</b><small>#22C55E</small></div>
  </div>
</body>
</html>
