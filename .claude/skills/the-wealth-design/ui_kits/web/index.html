<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>The Wealth — Web Dashboard UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="./styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="./TopBar.jsx"></script>
<script type="text/babel" src="./SideNav.jsx"></script>
<script type="text/babel" src="./StatRow.jsx"></script>
<script type="text/babel" src="./HoldingsTable.jsx"></script>
<script type="text/babel" src="./ChartPanel.jsx"></script>
<script type="text/babel" src="./Watchlist.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;
function App(){
  const [theme, setTheme] = useState("light");
  const [active, setActive] = useState("dashboard");
  useEffect(() => {
    document.documentElement.classList.toggle("dark", theme === "dark");
  }, [theme]);
  return (
    <div className="tw-app">
      <TopBar theme={theme} onToggleTheme={() => setTheme(t => t === "dark" ? "light" : "dark")} />
      <SideNav active={active} onSelect={setActive} />
      <main className="tw-main">
        <div className="tw-page-head">
          <div>
            <h1>대시보드</h1>
            <div className="tw-small">마지막 동기화 11:32 · 30초 주기 갱신</div>
          </div>
          <div className="tw-card-actions">
            <button className="tw-btn tw-btn-ghost">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 0 1-15.36 6.36L3 21"/><polyline points="3 16 3 21 8 21"/><path d="M3 12a9 9 0 0 1 15.36-6.36L21 3"/><polyline points="21 8 21 3 16 3"/></svg>
              동기화
            </button>
            <button className="tw-btn tw-btn-primary">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>
              종목 추가
            </button>
          </div>
        </div>
        <StatRow />
        <div className="tw-grid-2">
          <PortfolioChart />
          <SectorDonut />
        </div>
        <div className="tw-grid-2">
          <HoldingsTable />
          <Watchlist />
        </div>
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
