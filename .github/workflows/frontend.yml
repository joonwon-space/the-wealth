name: Frontend CI

on:
  push:
    branches: [main]
    paths: ['frontend/**']
  pull_request:
    paths: ['frontend/**']

defaults:
  run:
    working-directory: frontend

jobs:
  lint-build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run

      - name: Build
        run: npm run build

      - name: Bundle size budget check
        run: |
          # Warn if total client JS chunks exceed 1MB (uncompressed)
          BUDGET_BYTES=1048576
          TOTAL=$(find .next/static/chunks -name "*.js" -type f | xargs wc -c 2>/dev/null | tail -1 | awk '{print $1}')
          echo "Total client JS size: ${TOTAL} bytes (budget: ${BUDGET_BYTES} bytes)"
          if [ "${TOTAL:-0}" -gt "$BUDGET_BYTES" ]; then
            echo "WARNING: Bundle size ${TOTAL} bytes exceeds budget ${BUDGET_BYTES} bytes"
            echo "Run 'npm run analyze' locally to identify large chunks."
          fi
