name: Backend CI

# Path filters are applied per-step via dorny/paths-filter so the required
# status check always reports — even when the PR only touches unrelated files
# (e.g. Dependabot GitHub Actions bumps). See docs/runbooks/deploy.md.
on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: backend

jobs:
  lint-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: the_wealth_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - 'backend/**'
              - '.github/workflows/backend.yml'

      - name: Skip (no backend changes)
        if: steps.filter.outputs.relevant != 'true'
        run: echo "::notice::No backend changes in this PR — skipping lint/test, reporting success."

      - uses: actions/setup-python@v6
        if: steps.filter.outputs.relevant == 'true'
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - if: steps.filter.outputs.relevant == 'true'
        run: pip install -r requirements.txt

      - name: Security audit
        if: steps.filter.outputs.relevant == 'true'
        run: pip install pip-audit && pip-audit -r requirements.txt

      - name: Lint
        if: steps.filter.outputs.relevant == 'true'
        run: ruff check .

      - name: Test
        if: steps.filter.outputs.relevant == 'true'
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/the_wealth_test
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/the_wealth_test
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production-use
          JWT_ALGORITHM: HS256
          ENCRYPTION_MASTER_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          REDIS_URL: redis://localhost:6379
          KIS_BASE_URL: https://openapi.koreainvestment.com:9443
        run: python -m pytest tests/ -v --tb=short --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: codecov/codecov-action@v6
        if: always() && steps.filter.outputs.relevant == 'true'
        with:
          files: ./coverage.xml
          flags: backend
          fail_ci_if_error: false
