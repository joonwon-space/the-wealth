name: E2E Tests

# Path filters are applied per-step via dorny/paths-filter so the required
# status check always reports — even when the PR only touches unrelated files.
on:
  pull_request:

defaults:
  run:
    working-directory: frontend

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: the_wealth_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - 'frontend/**'
              - 'backend/**'
              - '.github/workflows/e2e.yml'

      - name: Skip (no relevant changes)
        if: steps.filter.outputs.relevant != 'true'
        run: echo "::notice::No frontend/backend changes in this PR — skipping E2E, reporting success."

      # ── Backend setup ─────────────────────────────────────────────
      - uses: actions/setup-python@v6
        if: steps.filter.outputs.relevant == 'true'
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        if: steps.filter.outputs.relevant == 'true'
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Start backend server
        if: steps.filter.outputs.relevant == 'true'
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/the_wealth_test
          JWT_SECRET_KEY: ci-e2e-test-secret-key-not-for-production
          JWT_ALGORITHM: HS256
          ENCRYPTION_MASTER_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          REDIS_URL: redis://localhost:6379
          KIS_BASE_URL: https://openapi.koreainvestment.com:9443
          CORS_ORIGINS: '["http://localhost:3000"]'
        run: |
          cd backend
          alembic upgrade head
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for backend..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            sleep 2
          done
        working-directory: .

      # ── Frontend setup ────────────────────────────────────────────
      - uses: actions/setup-node@v6
        if: steps.filter.outputs.relevant == 'true'
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: steps.filter.outputs.relevant == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.filter.outputs.relevant == 'true'
        run: npx playwright install chromium --with-deps

      - name: Build frontend
        if: steps.filter.outputs.relevant == 'true'
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

      - name: Start frontend server
        if: steps.filter.outputs.relevant == 'true'
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: |
          npm start &
          echo "Waiting for frontend..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend ready"
              break
            fi
            sleep 2
          done

      # ── Run E2E tests ─────────────────────────────────────────────
      - name: Run E2E tests
        if: steps.filter.outputs.relevant == 'true'
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: npx playwright test --project=chromium

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure() && steps.filter.outputs.relevant == 'true'
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
