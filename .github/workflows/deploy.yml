name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, deploy]
    timeout-minutes: 20
    env:
      DOCKER_CONFIG: /tmp/docker-config

    steps:
      - uses: actions/checkout@v4

      - name: Write backend .env
        run: echo "${{ secrets.BACKEND_ENV_FILE }}" > backend/.env

      - name: Prepare Docker config (bypass Keychain credential store)
        run: |
          mkdir -p /tmp/docker-config
          # Copy real config but remove credsStore that requires Keychain
          python3 -c "
          import json, shutil, os
          cfg = json.load(open(os.path.expanduser('~/.docker/config.json')))
          cfg.pop('credsStore', None)
          json.dump(cfg, open('/tmp/docker-config/config.json', 'w'))
          # Copy contexts directory if it exists
          ctx_src = os.path.expanduser('~/.docker/contexts')
          if os.path.isdir(ctx_src):
              shutil.copytree(ctx_src, '/tmp/docker-config/contexts', dirs_exist_ok=True)
          "

      - name: Build and restart services
        run: |
          cd ${{ github.workspace }}
          docker compose build --parallel
          docker compose up -d --remove-orphans
          docker compose ps

      - name: Wait for health checks
        run: |
          echo "Waiting for backend health..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend healthy"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8000/health || exit 1

          echo "Waiting for frontend..."
          for i in $(seq 1 15); do
            if curl -sf -o /dev/null http://localhost:3000 2>&1; then
              echo "Frontend healthy"
              break
            fi
            sleep 2
          done
          curl -s -o /dev/null -w "Frontend: HTTP %{http_code}\n" http://localhost:3000

      - name: Clean up old images
        run: docker image prune -f
